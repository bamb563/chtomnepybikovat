<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Опрос: Что мне публиковать</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1f2c38 0%, #0f1a1f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', 'Inter', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .poll-wrapper {
            max-width: 780px;
            width: 100%;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(2px);
            border-radius: 72px 56px 72px 56px;
            padding: 20px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.4);
        }

        .poll-card {
            background: #fffdf7;
            border-radius: 56px 40px 56px 40px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
        }

        .poll-header {
            background: linear-gradient(135deg, #ffdd99, #ffc46b);
            padding: 28px 28px 20px;
            text-align: center;
            border-bottom: 3px solid #ffa53e;
        }

        .poll-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #35200c;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 0 rgba(255, 210, 120, 0.7);
        }

        .poll-header p {
            font-size: 1rem;
            background: #fff1df;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            color: #9b5e2c;
            font-weight: 500;
            margin-top: 10px;
        }

        .poll-body {
            padding: 30px 28px 28px;
            background: #ffffff;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 32px;
        }

        .option-card {
            background: #fefaf4;
            border-radius: 28px;
            border: 1px solid #ffe5ca;
            transition: all 0.2s;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .option-card:hover {
            background: #fff6ea;
            border-color: #ffbc77;
            transform: translateX(5px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
        }

        .option-card.selected {
            border-color: #ff8c42;
            background: #fff8ef;
            box-shadow: 0 4px 12px rgba(255, 140, 66, 0.2);
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 16px 20px;
            cursor: pointer;
            width: 100%;
        }

        .option-image {
            width: 64px;
            height: 64px;
            border-radius: 24px;
            object-fit: cover;
            background: #f0e4d4;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: 0.2s;
            border: 2px solid transparent;
        }

        .option-card.selected .option-image {
            border-color: #ff8c42;
            transform: scale(1.02);
        }

        .option-info {
            flex: 1;
        }

        .option-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: #2c2b26;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .arrow-down {
            display: inline-block;
            font-size: 1.2rem;
            font-weight: normal;
            animation: bounceSoft 1.2s infinite ease;
            background: #f7e2c0;
            border-radius: 30px;
            padding: 2px 10px;
            line-height: 1;
            font-family: monospace;
        }

        @keyframes bounceSoft {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(4px); }
        }

        .option-desc {
            font-size: 0.8rem;
            color: #a77b4b;
            margin-top: 6px;
        }

        input[type="radio"] {
            width: 22px;
            height: 22px;
            accent-color: #ff914d;
            cursor: pointer;
            margin-right: 6px;
            flex-shrink: 0;
        }

        .custom-idea-area {
            margin-top: 8px;
            margin-bottom: 18px;
            padding: 8px 20px 18px 20px;
            background: #fffbf2;
            border-radius: 32px;
            border-left: 6px solid #ffaa66;
            transition: 0.2s;
        }

        .custom-label {
            font-weight: 700;
            color: #b86224;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .custom-input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 48px;
            border: 2px solid #ffdead;
            background: white;
            font-size: 1rem;
            font-family: inherit;
            transition: 0.2s;
        }

        .custom-input:focus {
            border-color: #ff9f4a;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 150, 50, 0.2);
        }

        .vote-btn {
            width: 100%;
            background: #ff8140;
            border: none;
            padding: 16px;
            font-size: 1.4rem;
            font-weight: 800;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.1s linear;
            margin-top: 10px;
            box-shadow: 0 8px 0 #b24910;
            transform: translateY(-2px);
            font-family: inherit;
        }

        .vote-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b24910;
        }

        .results-panel {
            margin-top: 30px;
            background: #fef3e6;
            border-radius: 38px;
            padding: 20px 24px;
            border: 1px solid #ffdbb5;
        }

        .results-header {
            font-weight: 800;
            font-size: 1.25rem;
            color: #6d3f19;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .total-badge {
            background: #ffd9b0;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        .result-item {
            margin-bottom: 14px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 600;
            color: #5c3e24;
            margin-bottom: 5px;
        }

        .bar-bg {
            background-color: #e7d5c0;
            border-radius: 30px;
            height: 30px;
            overflow: hidden;
        }

        .bar-fill {
            background: linear-gradient(90deg, #ffa559, #ff6e2c);
            width: 0%;
            height: 100%;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            transition: width 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .custom-message {
            margin-top: 18px;
            background: #fff1e2;
            padding: 12px 18px;
            border-radius: 28px;
            font-style: normal;
            border-left: 6px solid #ff8c42;
            color: #583f24;
            font-weight: 500;
        }

        .reset-button {
            background: none;
            border: 2px solid #dabb97;
            color: #b27a46;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .reset-button:hover {
            background: #eedfcb;
            border-color: #a2642c;
            color: #4f3119;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 18px;
            color: #bdab8f;
        }

        @media (max-width: 580px) {
            .option-image {
                width: 52px;
                height: 52px;
            }
            .option-title {
                font-size: 1.1rem;
            }
            .poll-body {
                padding: 20px;
            }
            .vote-btn {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="poll-wrapper">
    <div class="poll-card">
        <div class="poll-header">
            <h1>Что мне публиковать</h1>
            <p>Выбери направление — я учту твой голос</p>
        </div>
        <div class="poll-body">
            <div class="options-grid" id="optionsGrid">
                <!-- Смешарики -->
                <div class="option-card" data-value="смешарики">
                    <label class="radio-label">
                        <input type="radio" name="publishOption" value="смешарики">
                        <img class="option-image" src="https://avatars.mds.yandex.net/i?id=980e009167bdb9bbc1c37b38fcab2178b18cbe4f-5226897-images-thumbs&n=13" alt="смешарики" loading="lazy" onerror="this.src='https://placehold.co/64x64/FFDDBB/aa7744?text=img'">
                        <div class="option-info">
                            <div class="option-title">
                                Смешарики
                            </div>
                            <div class="option-desc">Посты с любимыми круглыми героями</div>
                        </div>
                    </label>
                </div>
                <!-- Картинки -->
                <div class="option-card" data-value="картинки">
                    <label class="radio-label">
                        <input type="radio" name="publishOption" value="картинки">
                        <img class="option-image" src="https://avatars.mds.yandex.net/i?id=6379295a8cc76fee63ab808a4fdd46c87dd52585-10809483-images-thumbs&n=13" alt="картинки" loading="lazy" onerror="this.src='https://placehold.co/64x64/FFDDBB/aa7744?text=img'">
                        <div class="option-info">
                            <div class="option-title">
                                Картинки
                            </div>
                            <div class="option-desc">Эстетика, иллюстрации, арты</div>
                        </div>
                    </label>
                </div>
                <!-- Шаблоны для мемов (новая картинка) -->
                <div class="option-card" data-value="шаблоны для мемов">
                    <label class="radio-label">
                        <input type="radio" name="publishOption" value="шаблоны для мемов">
                        <img class="option-image" src="https://avatars.mds.yandex.net/i?id=3b5c9450310187b7bcec6b3745558f49276c4d71-2468814-images-thumbs&n=13" alt="шаблоны для мемов" loading="lazy" onerror="this.src='https://placehold.co/64x64/FFDDBB/aa7744?text=img'">
                        <div class="option-info">
                            <div class="option-title">
                                Шаблоны для мемов
                            </div>
                            <div class="option-desc">Готовые форматы для юмора</div>
                        </div>
                    </label>
                </div>
                <!-- Придумай и напиши (со стрелкой вниз) -->
                <div class="option-card" data-value="custom_idea" id="customCard">
                    <label class="radio-label">
                        <input type="radio" name="publishOption" value="custom_idea" id="customRadio">
                        <img class="option-image" src="https://avatars.mds.yandex.net/i?id=9b2f543eca2e47623beda78cc59a65031bca904f-10514338-images-thumbs&n=13" alt="придумай идею" loading="lazy" onerror="this.src='https://placehold.co/64x64/FFDDBB/aa7744?text=idea'">
                        <div class="option-info">
                            <div class="option-title">
                                Придумай и напиши
                                <span class="arrow-down">↓</span>
                            </div>
                            <div class="option-desc">Предложи свою тему, я опубликую именно её</div>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Блок для ввода своей идеи (изначально скрыт) -->
            <div id="customWriteBlock" style="display: none;" class="custom-idea-area">
                <div class="custom-label">
                    <span>Напиши, что именно публиковать:</span>
                    <span class="arrow-down" style="font-size:1rem;">↓</span>
                </div>
                <input type="text" id="customIdeaInput" class="custom-input" placeholder="например: скетчи о жизни, обзоры игр, советы по учёбе..." autocomplete="off">
                <div style="font-size: 12px; margin-top: 8px; color:#b47c48;">Твоя идея появится в результатах и вдохновит других</div>
            </div>

            <button id="voteButton" class="vote-btn">ПРОГОЛОСОВАТЬ</button>

            <!-- Панель результатов -->
            <div class="results-panel" id="resultsPanel">
                <div class="results-header">
                    <span>Онлайн-результаты</span>
                    <span class="total-badge" id="totalVotesSpan">0 голосов</span>
                </div>
                <div id="resultsBarsContainer"></div>
                <div id="customIdeaMessage" class="custom-message">
                    Жду твоих идей. Выбери «Придумай и напиши» и поделись.
                </div>
                <div style="display: flex; justify-content: flex-end;">
                    <button id="resetPollBtn" class="reset-button">Сбросить опрос</button>
                </div>
            </div>
        </div>
    </div>
    <footer>онлайн-голосование | каждый голос важен</footer>
</div>

<script>
    // ---------- Хранилище ----------
    const STORAGE_VOTES = "publishPollImagesVotesClean";
    const STORAGE_CUSTOM_IDEAS = "publishPollCustomIdeasArrayClean";

    const BASIC_OPTIONS = ["смешарики", "картинки", "шаблоны для мемов"];
    const CUSTOM_KEY = "custom_idea";

    let votes = {};
    let customIdeasList = [];

    const radioBtns = document.querySelectorAll('input[name="publishOption"]');
    const voteBtn = document.getElementById('voteButton');
    const resetBtn = document.getElementById('resetPollBtn');
    const resultsContainer = document.getElementById('resultsBarsContainer');
    const totalSpan = document.getElementById('totalVotesSpan');
    const customBlock = document.getElementById('customWriteBlock');
    const customInput = document.getElementById('customIdeaInput');
    const customRadioElem = document.getElementById('customRadio');
    const customMessageDiv = document.getElementById('customIdeaMessage');

    function loadData() {
        const storedVotes = localStorage.getItem(STORAGE_VOTES);
        if (storedVotes) {
            try {
                votes = JSON.parse(storedVotes);
                for (let opt of BASIC_OPTIONS) {
                    if (typeof votes[opt] !== 'number') votes[opt] = 0;
                }
                if (typeof votes[CUSTOM_KEY] !== 'number') votes[CUSTOM_KEY] = 0;
            } catch(e) { resetVotesObject(); }
        } else {
            resetVotesObject();
        }

        const storedIdeas = localStorage.getItem(STORAGE_CUSTOM_IDEAS);
        if (storedIdeas) {
            try {
                customIdeasList = JSON.parse(storedIdeas);
                if (!Array.isArray(customIdeasList)) customIdeasList = [];
            } catch(e) { customIdeasList = []; }
        } else {
            customIdeasList = [];
        }
        if (customIdeasList.length > 50) customIdeasList = customIdeasList.slice(-50);
    }

    function resetVotesObject() {
        votes = {};
        for (let opt of BASIC_OPTIONS) votes[opt] = 0;
        votes[CUSTOM_KEY] = 0;
    }

    function saveVotes() {
        localStorage.setItem(STORAGE_VOTES, JSON.stringify(votes));
    }

    function saveIdeas() {
        localStorage.setItem(STORAGE_CUSTOM_IDEAS, JSON.stringify(customIdeasList));
    }

    function getLatestIdeaText() {
        if (!customIdeasList.length) return null;
        const sorted = [...customIdeasList].sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
        return sorted[0].text;
    }

    function renderResults() {
        let total = 0;
        for (let key in votes) if (typeof votes[key] === 'number') total += votes[key];
        
        let votesText = total + " голосов";
        if (total === 1) votesText = "1 голос";
        else if (total >= 2 && total <= 4) votesText = total + " голоса";
        totalSpan.innerText = votesText;

        let html = '';
        const displayMap = {
            "смешарики": "Смешарики",
            "картинки": "Картинки",
            "шаблоны для мемов": "Шаблоны для мемов",
            "custom_idea": "Придумай и напиши"
        };

        const order = [...BASIC_OPTIONS, CUSTOM_KEY];
        for (let key of order) {
            const count = votes[key] || 0;
            const percent = total === 0 ? 0 : ((count / total) * 100).toFixed(1);
            const label = displayMap[key] || (key === CUSTOM_KEY ? "Идеи читателей" : key);
            html += `
                <div class="result-item">
                    <div class="result-row">
                        <span>${label}</span>
                        <span>${count} (${percent}%)</span>
                    </div>
                    <div class="bar-bg">
                        <div class="bar-fill" style="width: ${percent}%;">${percent > 6 ? Math.floor(percent)+'%' : ''}</div>
                    </div>
                </div>
            `;
        }
        resultsContainer.innerHTML = html;

        const latestIdea = getLatestIdeaText();
        if (latestIdea && latestIdea.trim() !== "") {
            customMessageDiv.innerHTML = `↓ <strong>Последняя идея от сообщества:</strong> «${escapeHtml(latestIdea)}» — спасибо, вдохновляешь.`;
        } else {
            if (customIdeasList.length === 0) {
                customMessageDiv.innerHTML = `↓ <strong>Придумай идею первым.</strong> Выбери «Придумай и напиши» и предложи свой вариант контента. Стрелка вниз ↓ ждёт твой текст.`;
            } else {
                customMessageDiv.innerHTML = `↓ <strong>Твои идеи — топ.</strong> Голосуй за «Придумай и напиши» и делись новыми темами.`;
            }
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function toggleCustomInputVisibility() {
        const selectedRadio = document.querySelector('input[name="publishOption"]:checked');
        if (selectedRadio && selectedRadio.value === CUSTOM_KEY) {
            customBlock.style.display = "block";
            customInput.focus();
        } else {
            customBlock.style.display = "none";
        }
    }

    function highlightSelectedCard() {
        document.querySelectorAll('.option-card').forEach(card => card.classList.remove('selected'));
        const selectedRadio = document.querySelector('input[name="publishOption"]:checked');
        if (selectedRadio) {
            const parentCard = selectedRadio.closest('.option-card');
            if (parentCard) parentCard.classList.add('selected');
        }
        toggleCustomInputVisibility();
    }

    function addCustomIdea(ideaText) {
        let finalText = ideaText?.trim();
        if (!finalText || finalText === "") {
            finalText = "вдохновляющая тема от подписчика";
        }
        if (finalText.length > 140) finalText = finalText.slice(0, 137) + "...";
        const newIdea = {
            text: finalText,
            timestamp: Date.now()
        };
        customIdeasList.push(newIdea);
        if (customIdeasList.length > 50) customIdeasList = customIdeasList.slice(-50);
        saveIdeas();
    }

    function handleVote() {
        const selectedRadio = document.querySelector('input[name="publishOption"]:checked');
        if (!selectedRadio) {
            alert("Пожалуйста, выбери один из вариантов.");
            return;
        }

        let selectedVal = selectedRadio.value;
        let customTextFromUser = null;

        if (selectedVal === CUSTOM_KEY) {
            let rawIdea = customInput.value.trim();
            if (rawIdea === "") {
                if (confirm("Ты не написал свою идею, но голос засчитается в категорию «Придумай и напиши». Хочешь добавить идею позже?")) {
                    customTextFromUser = "идея без слов (аноним)";
                } else {
                    customTextFromUser = "предложение от зрителя";
                }
            } else {
                customTextFromUser = rawIdea;
                customInput.value = "";
            }
            if (customTextFromUser) {
                addCustomIdea(customTextFromUser);
            } else {
                addCustomIdea("интересная идея");
            }
        }

        if (votes.hasOwnProperty(selectedVal)) {
            votes[selectedVal] += 1;
        } else {
            votes[selectedVal] = 1;
        }
        saveVotes();
        renderResults();

        voteBtn.style.transform = "scale(0.97)";
        setTimeout(() => { voteBtn.style.transform = ""; }, 120);

        if (selectedRadio) selectedRadio.checked = false;
        customBlock.style.display = "none";
        customInput.value = "";
        document.querySelectorAll('.option-card').forEach(card => card.classList.remove('selected'));

        showToast("Голос учтён. Спасибо за участие.");
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = "fixed";
        toast.style.bottom = "25px";
        toast.style.left = "50%";
        toast.style.transform = "translateX(-50%)";
        toast.style.backgroundColor = "#2c6e49";
        toast.style.color = "white";
        toast.style.padding = "10px 26px";
        toast.style.borderRadius = "50px";
        toast.style.fontWeight = "bold";
        toast.style.zIndex = "999";
        toast.style.boxShadow = "0 5px 15px black";
        toast.style.backdropFilter = "blur(4px)";
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2200);
    }

    function resetPoll() {
        if (confirm("ВНИМАНИЕ. Все голоса и все предложенные идеи будут удалены безвозвратно. Продолжить?")) {
            resetVotesObject();
            customIdeasList = [];
            saveVotes();
            saveIdeas();
            const checkedRadio = document.querySelector('input[name="publishOption"]:checked');
            if (checkedRadio) checkedRadio.checked = false;
            customBlock.style.display = "none";
            customInput.value = "";
            renderResults();
            showToast("Опрос полностью сброшен. Начните голосование заново.");
        }
    }

    function bindEvents() {
        voteBtn.addEventListener('click', handleVote);
        resetBtn.addEventListener('click', resetPoll);
        radioBtns.forEach(radio => {
            radio.addEventListener('change', () => {
                highlightSelectedCard();
                toggleCustomInputVisibility();
            });
        });
        document.querySelectorAll('.option-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const inp = card.querySelector('input[type="radio"]');
                if (inp && !e.target.closest('input')) {
                    inp.checked = true;
                    highlightSelectedCard();
                    toggleCustomInputVisibility();
                }
            });
        });
    }

    function init() {
        loadData();
        renderResults();
        bindEvents();
        customBlock.style.display = "none";
        if (customRadioElem && customRadioElem.checked) {
            customBlock.style.display = "block";
        }
    }

    init();
</script>
</body>
</html>
